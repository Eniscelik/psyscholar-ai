services:
  db:
    image: postgres:16
    container_name: psyscholar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psyscholar
    ports:
      - "5432:5432"
    volumes:
      - psyscholar_postgres_data:/var/lib/postgresql/data

volumes:
  psyscholar_postgres_data:
